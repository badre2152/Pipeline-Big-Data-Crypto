# ─── VOLUMES ────────────────────────────────────────────────────────────────
volumes:
  minio_data:
  postgres_data:
  airflow_logs:

# ─── NETWORK ────────────────────────────────────────────────────────────────
networks:
  crypto_net:
    driver: bridge

# ─── SERVICES ───────────────────────────────────────────────────────────────
services:

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: crypto_minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - crypto_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO Buckets Init ─────────────────────────────────────────────────────
  # Crée les 3 buckets automatiquement au démarrage
  minio_init:
    image: minio/mc:latest
    container_name: crypto_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - crypto_net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/crypto-bronze;
      mc mb --ignore-existing local/crypto-silver;
      mc mb --ignore-existing local/crypto-gold;
      echo 'Buckets created: crypto-bronze, crypto-silver, crypto-gold';
      "

  # ── PostgreSQL — Airflow metadata DB ──────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: crypto_postgres
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crypto_net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ── Airflow Init ───────────────────────────────────────────────────────────
  airflow_init:
    image: apache/airflow:2.8.1
    container_name: crypto_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow
    volumes:
      - ./src/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env
    networks:
      - crypto_net
    entrypoint: >
      /bin/sh -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@crypto.local"

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow_webserver:
    image: apache/airflow:2.8.1
    container_name: crypto_airflow_webserver
    depends_on:
      - airflow_init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: 'crypto_secret_key'
    volumes:
      - ./src/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env
    networks:
      - crypto_net
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler ──────────────────────────────────────────────────────
  airflow_scheduler:
    image: apache/airflow:2.8.1
    container_name: crypto_airflow_scheduler
    depends_on:
      - airflow_init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow
    volumes:
      - ./src/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env
    networks:
      - crypto_net
    command: scheduler